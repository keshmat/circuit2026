<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration received — Keshmat Summer Circuit 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-base-200 flex items-center justify-center p-4">
    <div class="card bg-base-100 shadow-xl max-w-lg w-full">
        <div class="card-body text-center">
            <div class="text-6xl mb-2">✅</div>
            <h1 id="title" class="text-2xl font-bold mb-2"></h1>
            <p id="body" class="text-base-content/70 mb-4"></p>
            <div id="note" class="alert alert-warning text-sm mb-4"></div>
            <a href="index.html" id="back" class="btn btn-primary"></a>
        </div>
    </div>
    <script>
        const lang = localStorage.getItem("lang") || "en";
        if (localStorage.getItem("theme") === "light") document.documentElement.setAttribute("data-theme", "light");
        document.documentElement.setAttribute("lang", lang);
        document.documentElement.setAttribute("dir", lang === "ar" ? "rtl" : "ltr");
        const T = {
            en: {
                title: "Registration received!",
                body: "Thank you for registering for the Keshmat Summer Circuit 2026. A confirmation email is on its way.",
                note: "Your seat is confirmed only after our staff verifies your payment. The registration fee is non-refundable.",
                back: "Back to standings",
            },
            ar: {
                title: "تم استلام تسجيلك!",
                body: "شكراً لتسجيلك في دورة كش مات لصيف 2026. رسالة تأكيد في طريقها إليك عبر البريد الإلكتروني.",
                note: "يُؤكَّد مقعدك فقط بعد تحقّق فريقنا من دفعتك. رسم التسجيل غير قابل للاسترجاع.",
                back: "العودة إلى الترتيب",
            },
        };
        const d = T[lang] || T.en;
        title.textContent = d.title;
        body.textContent = d.body;
        note.textContent = d.note;
        back.textContent = d.back;
    </script>
</body>
</html>
